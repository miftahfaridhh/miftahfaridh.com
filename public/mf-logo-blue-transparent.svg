<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 348" width="680" height="696">
  <!-- MF Circuit Monogram Logo - Blue Edition -->
  <!-- Muhammad Miftah Faridh — Physical AI Engineer -->
  <!-- Color: Blue #378ADD -->

  <!-- Outer hexagonal frame -->
  <polygon points="170,0 320,87 320,261 170,348 20,261 20,87" fill="none" stroke="#378ADD" stroke-width="2" opacity="0.3"/>
  <!-- Inner hexagonal frame -->
  <polygon points="170,20 300,97 300,251 170,328 40,251 40,97" fill="none" stroke="#378ADD" stroke-width="1" opacity="0.15"/>

  <!-- M letter - circuit trace style -->
  <path d="M80,260 L80,100 L130,170 L170,100 L170,130" fill="none" stroke="#378ADD" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Circuit node dots on M -->
  <circle cx="80" cy="100" r="5" fill="#378ADD"/>
  <circle cx="130" cy="170" r="5" fill="#378ADD"/>
  <circle cx="170" cy="100" r="5" fill="#378ADD"/>
  <circle cx="80" cy="260" r="5" fill="#378ADD"/>

  <!-- F letter - circuit trace style -->
  <path d="M190,260 L190,100 L280,100" fill="none" stroke="#378ADD" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M190,175 L260,175" fill="none" stroke="#378ADD" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Circuit node dots on F -->
  <circle cx="190" cy="100" r="5" fill="#378ADD"/>
  <circle cx="280" cy="100" r="5" fill="#378ADD"/>
  <circle cx="260" cy="175" r="5" fill="#378ADD"/>
  <circle cx="190" cy="260" r="5" fill="#378ADD"/>

  <!-- Connecting circuit traces (dashed) -->
  <path d="M170,130 L190,130 L190,100" fill="none" stroke="#378ADD" stroke-width="2" stroke-dasharray="4 3" opacity="0.5"/>
  <line x1="80" y1="260" x2="190" y2="260" stroke="#378ADD" stroke-width="2" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Neural AI dots -->
  <circle cx="310" cy="130" r="3" fill="#378ADD" opacity="0.4"/>
  <circle cx="325" cy="160" r="2" fill="#378ADD" opacity="0.3"/>
  <circle cx="315" cy="200" r="3" fill="#378ADD" opacity="0.4"/>
  <line x1="280" y1="100" x2="310" y2="130" stroke="#378ADD" stroke-width="1" opacity="0.2"/>
  <line x1="260" y1="175" x2="325" y2="160" stroke="#378ADD" stroke-width="1" opacity="0.2"/>
</svg>
