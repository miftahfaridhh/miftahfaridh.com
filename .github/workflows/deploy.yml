name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: |
          npx vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --yes
        env:
          VERCEL_ORG_ID: team_HuYhan61aNQxFOhtROokGV5z
          VERCEL_PROJECT_ID: prj_BPTb84Zcc5bxLdNOs6m1Trb6W5rc
